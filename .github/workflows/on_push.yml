name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: cargo install -f wasm-bindgen-cli --version 0.2.111

      # - name: Install sccache
      #   uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build sog-decoder
        run: cargo build --package sog-decoder --verbose

      - name: Build sog-decoder-wasm
        run: |
          cargo build \
            --package sog-decoder-wasm \
            --target wasm32-unknown-unknown \
            --verbose

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: wasm-bindgen
        run: pnpm --filter @sog-loader/core run wasm:build

      - name: Build npm packages
        run: pnpm -r build
