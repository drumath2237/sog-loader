name: TypeScriptLint & Format

on:
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/**"
      - "packages.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"

jobs:
  check:
    name: Biome Check
    runs-on: ubuntu-slim
    strategy:
      matrix:
        package_name: [core, babylonjs]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm run --filter @sog-loader/${{ matrix.package_name }} check:ci
